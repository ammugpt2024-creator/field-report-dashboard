<svg width="360" height="120" viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dulles Engineering">
  <!-- Bridge mark -->
  <g>
    <!-- cable lines fanning from the tower apex down to the deck -->
    <g stroke="#1f74c9" stroke-width="2">
      <line x1="60" y1="20" x2="22" y2="80"/>
      <line x1="60" y1="20" x2="36" y2="80"/>
      <line x1="60" y1="20" x2="50" y2="80"/>
      <line x1="60" y1="20" x2="70" y2="80"/>
      <line x1="60" y1="20" x2="84" y2="80"/>
      <line x1="60" y1="20" x2="98" y2="80"/>
    </g>
    <!-- blue A-frame tower -->
    <path d="M60 12 L94 80 L74 80 L60 50 L46 80 L26 80 Z" fill="#1f74c9"/>
    <!-- bridge deck -->
    <rect x="14" y="80" width="92" height="9" fill="#3a2a1c"/>
    <!-- reflection -->
    <path d="M22 92 L98 92 L60 110 Z" fill="#3a2a1c" opacity="0.85"/>
  </g>
  <!-- Wordmark -->
  <text x="124" y="56" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" letter-spacing="1" fill="#1f74c9">DULLES</text>
  <text x="124" y="92" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="800" letter-spacing="3.2" fill="#2b2b2b">ENGINEERING</text>
</svg>
